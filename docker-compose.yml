services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: ia-researchhub-db
    environment:
      POSTGRES_DB: article_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./classification-service/init-pgvector.sql:/docker-entrypoint-initdb.d/init-pgvector.sql
    networks:
      - article-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local

networks:
  article-network:
    driver: bridge
